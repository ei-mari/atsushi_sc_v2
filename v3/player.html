<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Audio Player | Phrasal Verb Challenge</title>
  <style>
    :root{
      --bg1:#edf3ef;
      --bg2:#d8e7df;
      --card:#ffffff;
      --text:#101614;
      --muted:rgba(16,22,20,.62);
      --line:rgba(16,22,20,.10);
      --panel-shadow:0 24px 70px rgba(37,60,49,.12);
      --player-shadow:0 24px 48px rgba(10,18,15,.28);
      --green:#1db954;
      --green-deep:#14853c;
      --dark:#0f1613;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      justify-content:center;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.75), transparent 36%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Noto Sans JP",sans-serif;
    }
    .wrap{
      width:min(100%, 430px);
      max-width:430px;
      padding:18px 14px 28px;
    }
    .titleRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin:4px 0 12px;
    }
    .title{
      margin:0;
      font-size:22px;
      font-weight:900;
      letter-spacing:.02em;
    }
    .back{
      text-decoration:none;
      color:var(--text);
      font-weight:800;
      padding:10px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.8);
      box-shadow:0 8px 18px rgba(25,42,34,.08);
      white-space:nowrap;
    }
    .panel{
      border:1px solid rgba(255,255,255,.62);
      border-radius:30px;
      background:rgba(255,255,255,.72);
      backdrop-filter:blur(14px) saturate(1.15);
      box-shadow:var(--panel-shadow);
      overflow:hidden;
    }
    .panelHead,
    .panelBody{
      padding:14px;
    }
    .panelHead{
      display:flex;
      flex-direction:column;
      gap:12px;
      border-bottom:1px solid var(--line);
    }
    .row{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:6px;
      font-size:12px;
      line-height:1;
      padding:8px 11px;
      border-radius:999px;
      background:rgba(16,22,20,.06);
      color:var(--muted);
      white-space:nowrap;
      font-weight:700;
    }
    .deckBar{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
    }
    .deckSelect{
      width:min(250px, 100%);
      max-width:100%;
      border:1px solid var(--line);
      border-radius:14px;
      padding:11px 12px;
      background:#fff;
      color:var(--text);
      font-weight:800;
      box-shadow:0 8px 18px rgba(25,42,34,.06);
    }
    .deckCard{
      border:1px solid var(--line);
      background:rgba(255,255,255,.88);
      color:var(--text);
      border-radius:999px;
      padding:10px 12px;
      font-weight:800;
      cursor:pointer;
      box-shadow:0 8px 18px rgba(25,42,34,.06);
      white-space:nowrap;
    }
    .deckCard.active{
      background:var(--dark);
      color:#fff;
      border-color:var(--dark);
    }
    .playerStage{
      position:relative;
      overflow:hidden;
      padding:18px;
      border-radius:28px;
      color:#f7fbf9;
      background:
        radial-gradient(circle at 20% 18%, rgba(29,185,84,.34), transparent 28%),
        radial-gradient(circle at 82% 16%, rgba(123,255,180,.20), transparent 24%),
        linear-gradient(145deg, #15211c, #0b110e 72%);
      box-shadow:var(--player-shadow);
    }
    .playerStage::after{
      content:"";
      position:absolute;
      inset:auto -60px -70px auto;
      width:180px;
      height:180px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(255,255,255,.14), transparent 70%);
      pointer-events:none;
    }
    .stageTop{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom:16px;
    }
    .stageEyebrow{
      margin:0 0 6px;
      color:rgba(247,251,249,.72);
      font-size:11px;
      font-weight:800;
      letter-spacing:.16em;
      text-transform:uppercase;
    }
    .stageTitle{
      margin:0;
      font-size:22px;
      line-height:1.18;
      font-weight:900;
      letter-spacing:.01em;
    }
    .coverArt{
      position:relative;
      flex:0 0 88px;
      width:88px;
      height:88px;
      border-radius:24px;
      background:
        linear-gradient(145deg, rgba(255,255,255,.20), rgba(255,255,255,.06)),
        linear-gradient(145deg, rgba(29,185,84,.88), rgba(14,67,36,.92));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.18),
        0 14px 26px rgba(0,0,0,.28);
    }
    .coverArt::before,
    .coverArt::after{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%, -50%);
      border-radius:999px;
      background:rgba(255,255,255,.92);
    }
    .coverArt::before{
      width:44px;
      height:44px;
      opacity:.16;
    }
    .coverArt::after{
      width:14px;
      height:14px;
      box-shadow:
        -18px 0 0 0 rgba(255,255,255,.88),
        18px 0 0 0 rgba(255,255,255,.88),
        0 -18px 0 0 rgba(255,255,255,.88),
        0 18px 0 0 rgba(255,255,255,.88);
    }
    .playerMeta{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      margin-bottom:12px;
    }
    .stateChip{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:8px 11px;
      border-radius:999px;
      background:rgba(255,255,255,.10);
      font-size:12px;
      font-weight:800;
      color:rgba(247,251,249,.88);
      backdrop-filter:blur(8px);
    }
    .stateDot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:var(--green);
      box-shadow:0 0 14px rgba(29,185,84,.75);
    }
    .currentId{
      font-size:12px;
      color:rgba(247,251,249,.74);
      text-align:right;
      line-height:1.4;
    }
    .progressBlock{
      margin-top:10px;
    }
    .seekBar{
      width:100%;
      accent-color:var(--green);
      margin:0;
    }
    .timeRow{
      display:flex;
      justify-content:space-between;
      gap:12px;
      margin-top:8px;
      font-size:12px;
      color:rgba(247,251,249,.72);
      font-variant-numeric:tabular-nums;
    }
    .transport{
      display:grid;
      grid-template-columns:62px 62px 1fr 62px;
      gap:10px;
      align-items:center;
      margin-top:16px;
    }
    .circleBtn,
    .playBtn{
      border:0;
      cursor:pointer;
      font-weight:900;
      transition:transform .14s ease, opacity .14s ease, background .14s ease;
    }
    .circleBtn:active,
    .playBtn:active{
      transform:scale(.97);
    }
    .circleBtn{
      height:56px;
      border-radius:18px;
      background:rgba(255,255,255,.10);
      color:#fff;
      font-size:22px;
      backdrop-filter:blur(8px);
    }
    .playBtn{
      height:62px;
      border-radius:999px;
      background:#fff;
      color:#0e1712;
      font-size:22px;
      box-shadow:0 16px 24px rgba(0,0,0,.24);
    }
    .circleBtn:disabled,
    .playBtn:disabled{
      opacity:.42;
      cursor:not-allowed;
      transform:none;
    }
    .loopGroup{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin-top:16px;
    }
    .chipBtn{
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.08);
      color:rgba(247,251,249,.88);
      border-radius:999px;
      padding:10px 12px;
      font-weight:800;
      cursor:pointer;
      backdrop-filter:blur(8px);
    }
    .chipBtn.toggleOn{
      background:rgba(29,185,84,.18);
      border-color:rgba(29,185,84,.34);
      color:#fff;
    }
    .chipBtn:disabled{
      opacity:.42;
      cursor:not-allowed;
    }
    .speedGroup{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:12px;
    }
    .speedBtn{
      min-width:64px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.08);
      color:rgba(247,251,249,.82);
      border-radius:999px;
      padding:9px 12px;
      font-weight:800;
      cursor:pointer;
    }
    .speedBtn.active{
      background:#fff;
      color:#0f1713;
      border-color:#fff;
    }
    .panelBody{
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .now{
      border:1px solid var(--line);
      border-radius:22px;
      padding:14px;
      background:rgba(255,255,255,.88);
      box-shadow:0 10px 24px rgba(25,42,34,.06);
    }
    .nowFooter{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .ja{
      margin:0 0 8px;
      font-size:19px;
      font-weight:900;
      line-height:1.42;
      overflow-wrap:anywhere;
      word-break:break-word;
    }
    .en{
      margin:0 0 8px;
      font-size:14px;
      line-height:1.55;
      color:rgba(16,22,20,.88);
      overflow-wrap:anywhere;
      word-break:break-word;
    }
    .ipa{
      margin:0 0 8px;
      font-size:12px;
      line-height:1.5;
      color:var(--muted);
      overflow-wrap:anywhere;
      word-break:break-word;
    }
    .meta{
      margin:0;
      font-size:12px;
      color:var(--muted);
    }
    .starBtn{
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      border-radius:999px;
      width:42px;
      height:42px;
      flex:0 0 42px;
      font-size:22px;
      line-height:1;
      cursor:pointer;
      box-shadow:0 8px 18px rgba(25,42,34,.07);
    }
    .starBtn.active{
      background:#111;
      color:#fff;
      border-color:#111;
    }
    .starBtn:disabled{
      opacity:.42;
      cursor:not-allowed;
    }
    .listTitle{
      margin:4px 0 0;
      font-size:13px;
      color:var(--muted);
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
    }
    .trackList{
      display:flex;
      flex-direction:column;
      gap:8px;
      max-height:42vh;
      overflow:auto;
      padding-right:2px;
    }
    .trackBtn{
      width:100%;
      text-align:left;
      border:1px solid var(--line);
      border-radius:18px;
      background:rgba(255,255,255,.9);
      padding:12px;
      cursor:pointer;
      display:flex;
      align-items:center;
      gap:12px;
      box-shadow:0 8px 20px rgba(25,42,34,.05);
    }
    .trackBtn.active{
      border-color:rgba(29,185,84,.30);
      box-shadow:
        inset 0 0 0 1px rgba(29,185,84,.34),
        0 10px 22px rgba(25,42,34,.08);
      background:linear-gradient(180deg, rgba(29,185,84,.08), rgba(255,255,255,.96));
    }
    .trackIndex{
      flex:0 0 34px;
      width:34px;
      height:34px;
      border-radius:999px;
      display:grid;
      place-items:center;
      background:rgba(16,22,20,.06);
      color:var(--muted);
      font-size:12px;
      font-weight:900;
    }
    .trackBtn.active .trackIndex{
      background:rgba(29,185,84,.18);
      color:var(--green-deep);
    }
    .trackText{
      min-width:0;
      flex:1;
      display:flex;
      flex-direction:column;
      gap:5px;
    }
    .trackJa{
      margin:0;
      font-size:15px;
      line-height:1.45;
      overflow-wrap:anywhere;
      word-break:break-word;
    }
    .trackMeta{
      margin:0;
      font-size:12px;
      color:var(--muted);
    }
    .empty{
      color:var(--muted);
      font-size:13px;
      padding:10px 2px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="titleRow">
      <h1 class="title">Audio Player</h1>
      <a class="back" href="./index.html">← 戻る</a>
    </div>

    <div class="panel">
      <div class="panelHead">
        <div class="row">
          <span class="pill" id="status">loading…</span>
          <span class="pill" id="filterInfo">Deck: All</span>
        </div>

        <div id="deckBar" class="deckBar"></div>
      </div>

      <div class="panelBody">
        <section class="playerStage">
          <div class="stageTop">
            <div>
              <p class="stageEyebrow">Phrasal Verb Audio</p>
              <h2 class="stageTitle">Study Session</h2>
            </div>
            <div class="coverArt" aria-hidden="true"></div>
          </div>

          <div class="playerMeta">
            <div class="stateChip">
              <span class="stateDot"></span>
              <span id="stateText">Ready</span>
            </div>
            <div class="currentId" id="currentId">UNIT --- • ---</div>
          </div>

          <div class="progressBlock">
            <input class="seekBar" id="seekBar" type="range" min="0" max="1000" value="0" step="1" disabled />
            <div class="timeRow">
              <span id="currentTimeEl">0:00</span>
              <span id="durationEl">0:00</span>
            </div>
          </div>

          <div class="transport">
            <button class="circleBtn" id="shuffleBtn" type="button" aria-label="Shuffle" disabled>🔀</button>
            <button class="circleBtn" id="prevBtn" type="button" aria-label="Previous" disabled>⏮</button>
            <button class="playBtn" id="playPauseBtn" type="button" aria-label="Play" disabled>▶</button>
            <button class="circleBtn" id="nextBtn" type="button" aria-label="Next" disabled>⏭</button>
          </div>

          <div class="loopGroup">
            <button class="chipBtn" id="singleLoopBtn" type="button">SINGLE LOOP</button>
            <button class="chipBtn" id="allLoopBtn" type="button">ALL LOOP</button>
          </div>

          <div class="speedGroup">
            <button class="speedBtn" type="button" data-rate="0.5">0.5x</button>
            <button class="speedBtn" type="button" data-rate="0.75">0.75x</button>
            <button class="speedBtn" type="button" data-rate="1">1.0x</button>
          </div>

          <audio id="audioEl" preload="auto"></audio>
        </section>

        <div class="now">
          <p class="ja" id="nowJa">—</p>
          <p class="en" id="nowEn"></p>
          <p class="ipa" id="nowIpa"></p>
          <div class="nowFooter">
            <p class="meta" id="nowMeta">—</p>
            <button class="starBtn" id="starBtn" type="button" aria-label="Toggle Star">☆</button>
          </div>
        </div>

        <p class="listTitle" id="listTitle">Playlist</p>
        <div class="trackList" id="trackList"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script>
    const CSV_URL = "./cards.csv";
    const LS_KEY = "pv_audio_player_v2_settings";
    const LS_PROGRESS_KEY = "pv_srs_anki_v5_progress";
    const AUTO_ADVANCE_GAP_MS = 2000;

    const statusEl = document.getElementById("status");
    const filterInfoEl = document.getElementById("filterInfo");
    const deckBarEl = document.getElementById("deckBar");
    const listTitleEl = document.getElementById("listTitle");
    const trackListEl = document.getElementById("trackList");

    const stateTextEl = document.getElementById("stateText");
    const currentIdEl = document.getElementById("currentId");
    const currentTimeEl = document.getElementById("currentTimeEl");
    const durationEl = document.getElementById("durationEl");
    const seekBarEl = document.getElementById("seekBar");

    const nowJaEl = document.getElementById("nowJa");
    const nowEnEl = document.getElementById("nowEn");
    const nowIpaEl = document.getElementById("nowIpa");
    const nowMetaEl = document.getElementById("nowMeta");
    const starBtn = document.getElementById("starBtn");

    const shuffleBtn = document.getElementById("shuffleBtn");
    const prevBtn = document.getElementById("prevBtn");
    const playPauseBtn = document.getElementById("playPauseBtn");
    const nextBtn = document.getElementById("nextBtn");
    const singleLoopBtn = document.getElementById("singleLoopBtn");
    const allLoopBtn = document.getElementById("allLoopBtn");
    const speedButtons = Array.from(document.querySelectorAll(".speedBtn"));
    const audioEl = document.getElementById("audioEl");

    let cards = [];
    let progress = {};
    let playlist = [];
    let currentIndex = -1;
    let settings = { deck: "all", shuffle: false, rate: 1, loopMode: "all" };
    let isSeeking = false;
    let advanceTimer = null;

    function loadSettings(){
      try{
        const raw = localStorage.getItem(LS_KEY);
        if (!raw) return;
        const s = JSON.parse(raw);
        settings.deck = s.deck ?? "all";
        settings.shuffle = !!s.shuffle;
        settings.rate = Number(s.rate ?? 1);
        settings.loopMode = s.loopMode === "one" ? "one" : "all";
      }catch{}
    }

    function saveSettings(){
      localStorage.setItem(LS_KEY, JSON.stringify(settings));
    }

    function loadProgress(){
      try{
        const raw = localStorage.getItem(LS_PROGRESS_KEY);
        progress = raw ? JSON.parse(raw) : {};
      }catch{
        progress = {};
      }
    }

    function saveProgress(){
      localStorage.setItem(LS_PROGRESS_KEY, JSON.stringify(progress));
    }

    function ensureStateForCard(id){
      if (!progress[id]) progress[id] = { starred: false };
      progress[id].starred ??= false;
    }

    function clearAdvanceTimer(){
      if (!advanceTimer) return;
      clearTimeout(advanceTimer);
      advanceTimer = null;
    }

    function formatTime(sec){
      if (!Number.isFinite(sec) || sec < 0) return "0:00";
      const total = Math.floor(sec);
      const min = Math.floor(total / 60);
      const rem = total % 60;
      return `${min}:${String(rem).padStart(2, "0")}`;
    }

    function deckRange(deckNum){
      const start = (deckNum - 1) * 5 + 1;
      const end = deckNum * 5;
      return { start, end };
    }

    function isReviewMode(){
      return settings.deck === "review";
    }

    function inDeck(unitNum){
      if (settings.deck === "all") return true;
      if (settings.deck === "review") return true;
      const dn = Number(settings.deck);
      const { start, end } = deckRange(dn);
      return unitNum >= start && unitNum <= end;
    }

    function isStarred(id){
      return !!progress[id]?.starred;
    }

    function getDeckLabel(){
      if (settings.deck === "review") return "Review";
      return settings.deck === "all" ? "All" : `Deck ${String(Number(settings.deck)).padStart(2, "0")}`;
    }

    function syncSpeedButtons(){
      speedButtons.forEach((btn)=>{
        btn.classList.toggle("active", Number(btn.dataset.rate) === settings.rate);
      });
    }

    function syncLoopButtons(){
      singleLoopBtn.classList.toggle("toggleOn", settings.loopMode === "one");
      allLoopBtn.classList.toggle("toggleOn", settings.loopMode === "all");
    }

    function updateTopInfo(){
      statusEl.textContent = `tracks ${playlist.length}`;
      filterInfoEl.textContent = `Deck: ${getDeckLabel()}`;
      listTitleEl.textContent = isReviewMode() ? `Review ${playlist.length}` : `Playlist ${playlist.length}`;
      shuffleBtn.classList.toggle("toggleOn", settings.shuffle);
      shuffleBtn.setAttribute("aria-label", settings.shuffle ? "Shuffle On" : "Shuffle Off");
      syncSpeedButtons();
      syncLoopButtons();
    }

    function setNow(track){
      if (!track){
        nowJaEl.textContent = isReviewMode() ? "☆REVIEW の音声がありません。" : "再生できる音声がありません。";
        nowEnEl.textContent = "";
        nowIpaEl.textContent = "";
        nowMetaEl.textContent = "—";
        currentIdEl.textContent = "UNIT --- • ---";
        starBtn.textContent = "☆";
        starBtn.classList.remove("active");
        starBtn.disabled = true;
        return;
      }

      nowJaEl.textContent = track.ja || "(no ja)";
      nowEnEl.textContent = track.en || "";
      nowIpaEl.textContent = track.ipa || "";
      nowMetaEl.textContent = `UNIT ${String(track.unit).padStart(3, "0")} • ${track.id}`;
      currentIdEl.textContent = `UNIT ${String(track.unit).padStart(3, "0")} • ${track.id}`;
      starBtn.disabled = false;
      starBtn.textContent = isStarred(track.id) ? "★" : "☆";
      starBtn.classList.toggle("active", isStarred(track.id));
    }

    function updatePlayPauseLabel(){
      if (playlist.length === 0){
        playPauseBtn.textContent = "▶";
        playPauseBtn.setAttribute("aria-label", "Play");
        stateTextEl.textContent = "Ready";
        return;
      }
      if (!audioEl.src){
        playPauseBtn.textContent = "▶";
        playPauseBtn.setAttribute("aria-label", "Play");
        stateTextEl.textContent = "Selected";
        return;
      }
      playPauseBtn.textContent = audioEl.paused ? "▶" : "⏸";
      playPauseBtn.setAttribute("aria-label", audioEl.paused ? "Play" : "Pause");
      stateTextEl.textContent = audioEl.paused ? "Paused" : "Now Playing";
    }

    function updateControlEnabled(){
      const hasTracks = playlist.length > 0;
      shuffleBtn.disabled = !hasTracks;
      prevBtn.disabled = !hasTracks;
      playPauseBtn.disabled = !hasTracks;
      nextBtn.disabled = !hasTracks;
      singleLoopBtn.disabled = !hasTracks;
      allLoopBtn.disabled = !hasTracks;
      seekBarEl.disabled = !hasTracks;
      speedButtons.forEach((btn)=>{ btn.disabled = !hasTracks; });
    }

    function syncProgress(){
      const duration = audioEl.duration;
      const currentTime = audioEl.currentTime;
      currentTimeEl.textContent = formatTime(currentTime);
      durationEl.textContent = formatTime(duration);

      if (!isSeeking){
        if (Number.isFinite(duration) && duration > 0){
          seekBarEl.value = String(Math.round((currentTime / duration) * 1000));
        } else {
          seekBarEl.value = "0";
        }
      }
    }

    function renderTrackList(){
      trackListEl.innerHTML = "";

      if (playlist.length === 0){
        const div = document.createElement("div");
        div.className = "empty";
        div.textContent = isReviewMode() ? "☆付きの音声がまだありません。" : "このDeckには再生できる音声がありません。";
        trackListEl.appendChild(div);
        return;
      }

      for (let i = 0; i < playlist.length; i++){
        const t = playlist[i];
        const btn = document.createElement("button");
        btn.className = "trackBtn" + (i === currentIndex ? " active" : "");
        btn.type = "button";

        const index = document.createElement("div");
        index.className = "trackIndex";
        index.textContent = String(i + 1);

        const text = document.createElement("div");
        text.className = "trackText";

        const ja = document.createElement("p");
        ja.className = "trackJa";
        ja.textContent = t.ja || "(no ja)";

        const meta = document.createElement("p");
        meta.className = "trackMeta";
        meta.textContent = `UNIT ${String(t.unit).padStart(3, "0")} • ${t.id}`;

        text.appendChild(ja);
        text.appendChild(meta);
        btn.appendChild(index);
        btn.appendChild(text);
        btn.addEventListener("click", ()=> selectTrack(i, true));
        trackListEl.appendChild(btn);
      }
    }

    function shuffleArray(arr){
      for (let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function buildDeckOptions(){
      const maxUnit = Math.max(1, ...cards.map(c => c.unit));
      const deckCount = Math.ceil(maxUnit / 5);
      deckBarEl.innerHTML = "";

      function activateDeck(value){
        clearAdvanceTimer();
        settings.deck = value;
        saveSettings();
        buildPlaylist(false);
        if (playlist.length > 0) selectTrack(0, false);
      }

      if (deckCount <= 8){
        const addCard = (label, value) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "deckCard" + (settings.deck === value ? " active" : "");
          btn.textContent = label;
          btn.addEventListener("click", ()=> activateDeck(value));
          deckBarEl.appendChild(btn);
        };

        addCard("All", "all");
        addCard("Review", "review");
        for (let d = 1; d <= deckCount; d++) addCard(`Deck ${String(d).padStart(2, "0")}`, String(d));
        return;
      }

      const sel = document.createElement("select");
      sel.className = "deckSelect";

      const addOpt = (label, value) => {
        const opt = document.createElement("option");
        opt.value = value;
        opt.textContent = label;
        sel.appendChild(opt);
      };

      addOpt("All", "all");
      addOpt("Review", "review");
      for (let d = 1; d <= deckCount; d++) addOpt(`Deck ${String(d).padStart(2, "0")}`, String(d));
      sel.value = settings.deck;
      sel.addEventListener("change", ()=> activateDeck(sel.value));
      deckBarEl.appendChild(sel);
    }

    function buildPlaylist(keepCurrent = true){
      clearAdvanceTimer();
      const currentId = keepCurrent && currentIndex >= 0 && playlist[currentIndex] ? playlist[currentIndex].id : null;
      let arr = cards
        .filter(c => c.audioUrl && (isReviewMode() ? isStarred(c.id) : inDeck(c.unit)))
        .slice()
        .sort((a, b)=>(a.unit - b.unit) || (a.idx - b.idx));

      if (settings.shuffle) arr = shuffleArray(arr);
      playlist = arr;
      updateTopInfo();

      if (playlist.length === 0){
        currentIndex = -1;
        audioEl.pause();
        audioEl.removeAttribute("src");
        audioEl.load();
        setNow(null);
        renderTrackList();
        updateControlEnabled();
        syncProgress();
        updatePlayPauseLabel();
        return;
      }

      if (currentId){
        const found = playlist.findIndex(t => t.id === currentId);
        currentIndex = found >= 0 ? found : 0;
      } else {
        currentIndex = currentIndex >= 0 && currentIndex < playlist.length ? currentIndex : 0;
      }

      setNow(playlist[currentIndex]);
      renderTrackList();
      updateControlEnabled();
      updatePlayPauseLabel();
    }

    async function selectTrack(index, autoplay = false){
      if (index < 0 || index >= playlist.length) return;
      clearAdvanceTimer();

      currentIndex = index;
      const track = playlist[currentIndex];
      const wasPlaying = autoplay || !audioEl.paused;

      setNow(track);
      renderTrackList();

      if (audioEl.src !== track.audioUrl) audioEl.src = track.audioUrl;
      audioEl.playbackRate = settings.rate;
      syncProgress();

      if (wasPlaying){
        try{
          await audioEl.play();
        }catch{}
      }
      updatePlayPauseLabel();
    }

    function nextTrack(autoplay = true){
      if (playlist.length === 0) return;
      clearAdvanceTimer();
      const next = (currentIndex + 1) % playlist.length;
      selectTrack(next, autoplay);
    }

    function prevTrack(autoplay = true){
      if (playlist.length === 0) return;
      clearAdvanceTimer();
      if (audioEl.currentTime > 3 && autoplay){
        audioEl.currentTime = 0;
        syncProgress();
        return;
      }
      const prev = (currentIndex - 1 + playlist.length) % playlist.length;
      selectTrack(prev, autoplay);
    }

    function handleEnded(){
      if (playlist.length === 0 || currentIndex < 0) return;
      clearAdvanceTimer();
      stateTextEl.textContent = "Next in 2 sec";

      advanceTimer = setTimeout(()=>{
        advanceTimer = null;
        if (settings.loopMode === "one"){
          audioEl.currentTime = 0;
          audioEl.play().catch(()=>{});
          return;
        }
        if (currentIndex + 1 < playlist.length){
          selectTrack(currentIndex + 1, true);
          return;
        }
        selectTrack(0, true);
      }, AUTO_ADVANCE_GAP_MS);
    }

    function toggleCurrentStar(){
      if (currentIndex < 0 || !playlist[currentIndex]) return;
      const id = playlist[currentIndex].id;
      ensureStateForCard(id);
      progress[id].starred = !progress[id].starred;
      saveProgress();

      if (isReviewMode()){
        buildPlaylist(true);
      } else {
        setNow(playlist[currentIndex]);
        renderTrackList();
      }
    }

    async function loadCsv(){
      statusEl.textContent = "loading…";
      const res = await fetch(CSV_URL, { cache: "no-store" });
      if (!res.ok) throw new Error("CSV fetch failed");
      const text = await res.text();

      const parsed = Papa.parse(text, { header: true, skipEmptyLines: true });
      cards = (parsed.data || []).map(r => ({
        unit: Number(r.unit),
        idx: Number(r.idx),
        id: (r.id ?? "").trim(),
        ja: (r.ja ?? "").trim(),
        en: (r.en ?? "").trim(),
        ipa: (r.ipa ?? "").trim(),
        audioUrl: (r.audioUrl ?? "").trim()
      })).filter(c => c.id && Number.isFinite(c.unit) && Number.isFinite(c.idx));

      cards.forEach(c => ensureStateForCard(c.id));
      saveProgress();

      buildDeckOptions();
      buildPlaylist(false);
      if (playlist.length > 0) selectTrack(0, false);
      updateTopInfo();
    }

    loadSettings();
    loadProgress();
    updateTopInfo();
    updateControlEnabled();
    syncProgress();
    updatePlayPauseLabel();

    playPauseBtn.addEventListener("click", async ()=>{
      if (playlist.length === 0) return;
      if (currentIndex < 0) currentIndex = 0;
      clearAdvanceTimer();

      if (!audioEl.src){
        await selectTrack(currentIndex, true);
        return;
      }

      if (audioEl.paused){
        try{
          if (Number.isFinite(audioEl.duration) && audioEl.currentTime >= audioEl.duration) audioEl.currentTime = 0;
          await audioEl.play();
        }catch{}
      } else {
        audioEl.pause();
      }
      updatePlayPauseLabel();
    });

    shuffleBtn.addEventListener("click", ()=>{
      clearAdvanceTimer();
      settings.shuffle = !settings.shuffle;
      saveSettings();
      buildPlaylist(true);
      if (currentIndex >= 0) selectTrack(currentIndex, false);
    });

    prevBtn.addEventListener("click", ()=> prevTrack(true));
    nextBtn.addEventListener("click", ()=> nextTrack(true));

    singleLoopBtn.addEventListener("click", ()=>{
      settings.loopMode = "one";
      saveSettings();
      updateTopInfo();
    });

    allLoopBtn.addEventListener("click", ()=>{
      settings.loopMode = "all";
      saveSettings();
      updateTopInfo();
    });

    speedButtons.forEach((btn)=>{
      btn.addEventListener("click", ()=>{
        settings.rate = Number(btn.dataset.rate || 1);
        saveSettings();
        audioEl.playbackRate = settings.rate;
        syncSpeedButtons();
      });
    });

    starBtn.addEventListener("click", toggleCurrentStar);

    seekBarEl.addEventListener("input", ()=>{
      if (!Number.isFinite(audioEl.duration) || audioEl.duration <= 0) return;
      isSeeking = true;
      const ratio = Number(seekBarEl.value) / 1000;
      currentTimeEl.textContent = formatTime(audioEl.duration * ratio);
    });

    seekBarEl.addEventListener("change", ()=>{
      if (!Number.isFinite(audioEl.duration) || audioEl.duration <= 0) return;
      const ratio = Number(seekBarEl.value) / 1000;
      audioEl.currentTime = audioEl.duration * ratio;
      isSeeking = false;
      syncProgress();
    });

    audioEl.addEventListener("loadedmetadata", syncProgress);
    audioEl.addEventListener("durationchange", syncProgress);
    audioEl.addEventListener("timeupdate", syncProgress);
    audioEl.addEventListener("ended", handleEnded);
    audioEl.addEventListener("play", updatePlayPauseLabel);
    audioEl.addEventListener("pause", updatePlayPauseLabel);
    audioEl.addEventListener("error", updatePlayPauseLabel);

    loadCsv().catch((err)=>{
      console.error(err);
      statusEl.textContent = "CSV読み込み失敗";
      setNow(null);
      listTitleEl.textContent = "Playlist 0";
      trackListEl.innerHTML = '<div class="empty">cards.csv の読み込みに失敗しました。</div>';
      updateControlEnabled();
      syncProgress();
    });
  </script>
</body>
</html>
