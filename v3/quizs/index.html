<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Phrasal Verb Test</title>
  <style>
    :root{
      --bg:#f7f2fa;
      --card:#fffbfe;
      --text:#1d1b20;
      --muted:#625b71;
      --line:#e7e0ec;
      --primary:#6750a4;
      --primary-dark:#4f378b;
      --primary-soft:#eaddff;
      --secondary:#006a6a;
      --secondary-soft:#cce8e7;
      --tertiary:#7d5260;
      --tertiary-soft:#ffd8e4;
      --warning:#7c5800;
      --warning-soft:#ffdea8;
      --green-soft:#dff6dd;
      --bad:#ba1a1a;
      --bad-soft:#ffdad6;
      --shadow:0 1px 2px rgba(29,27,32,.16), 0 6px 16px rgba(29,27,32,.08);
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      background:
        radial-gradient(circle at 12% 0%, rgba(103,80,164,.12), transparent 34%),
        radial-gradient(circle at 90% 8%, rgba(0,106,106,.1), transparent 32%),
        linear-gradient(180deg, #fffbfe 0%, #f7f2fa 100%);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Noto Sans JP",sans-serif;
      min-height:100vh;
      display:flex;
      justify-content:center;
    }
    .wrap{
      width:min(100%, 430px);
      padding:22px 16px 28px;
    }
    header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin:2px 0 14px;
      position:static;
    }
    h1{
      font-size:26px;
      line-height:1.2;
      margin:0;
      font-weight:900;
    }
    .sub{
      color:var(--muted);
      font-size:14px;
      line-height:1.45;
      margin-top:7px;
    }
    button{
      border:0;
      border-radius:14px;
      background:var(--primary);
      color:#fff;
      font-weight:800;
      padding:13px 18px;
      cursor:pointer;
      min-height:46px;
      box-shadow:0 2px 4px rgba(29,27,32,.18);
      transition:transform .12s ease, box-shadow .12s ease, background .12s ease;
    }
    button:hover{
      transform:translateY(-1px);
      background:var(--primary-dark);
    }
    button:active{
      transform:translateY(1px);
      box-shadow:0 1px 2px rgba(29,27,32,.18);
    }
    button.secondary{
      background:var(--primary-soft);
      color:var(--primary-dark);
      border:0;
      box-shadow:none;
    }
    button:disabled{
      opacity:.5;
      cursor:not-allowed;
      transform:none;
    }
    .hidden{ display:none !important; }
    .panel{
      background:var(--card);
      border:2px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      overflow:hidden;
      position:relative;
    }
    .panel::before{
      content:"";
      display:block;
      height:6px;
      background:linear-gradient(90deg, var(--primary), var(--secondary), var(--tertiary));
    }
    #modePanel,
    #setPanel{
      background:transparent;
      border:0;
      border-radius:0;
      box-shadow:none;
      overflow:visible;
    }
    #modePanel::before,
    #setPanel::before{
      display:none;
    }
    .modeGrid{
      display:grid;
      grid-template-columns:1fr;
      gap:18px;
      padding:0;
    }
    .setPanel{
      padding:0 0 22px;
      --set-content-inset:30px;
      --set-content-right-inset:22px;
    }
    .homeBackBtn{
      display:none;
      width:100%;
      margin-bottom:16px;
      background:#fff;
      color:var(--primary-dark);
      border:1px solid var(--line);
      box-shadow:0 1px 2px rgba(29,27,32,.08);
    }
    .setIntro{
      display:none;
      margin:0;
      color:var(--muted);
      font-size:15px;
      line-height:1.6;
      font-weight:800;
    }
    .setHero{
      margin-bottom:18px;
      padding:0;
      border-radius:0;
      background:transparent;
      border:0;
      box-shadow:none;
      position:relative;
    }
    .setHeroThumb,
    .modeThumb{
      display:block;
      width:100%;
      aspect-ratio:16 / 10;
      object-fit:cover;
      border-radius:18px;
      border:0;
      box-shadow:none;
      background:#f8f3ff;
    }
    .setHeroThumb{
      margin-bottom:0;
      box-shadow:none;
    }
    .setHeroLabel{
      display:block;
      border-radius:0;
      padding:0;
      margin:14px 0 14px var(--set-content-inset);
      background:transparent;
      color:var(--text);
      font-size:24px;
      line-height:1.2;
      font-weight:950;
      letter-spacing:0;
      box-shadow:none;
    }
    .setHeroTitle{
      display:none;
      margin:0;
      color:var(--text);
      font-size:22px;
      line-height:1.25;
      font-weight:950;
    }
    .setGrid{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
      width:calc(100% - var(--set-content-inset) - var(--set-content-right-inset));
      margin-left:var(--set-content-inset);
    }
    .rangeBlock{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
      width:calc(100% - var(--set-content-inset) - var(--set-content-right-inset));
      margin:0 0 28px var(--set-content-inset);
    }
    .rangeBlock:last-child{
      margin-bottom:0;
    }
    .rangeTitle{
      margin:0 0 4px;
      color:var(--text);
      font-size:24px;
      line-height:1.2;
      font-weight:950;
    }
    .rangeNote{
      margin:-2px 0 4px;
      color:var(--muted);
      font-size:13px;
      line-height:1.45;
      font-weight:800;
    }
    .setButton{
      display:grid;
      place-items:center start;
      gap:4px;
      width:100%;
      min-height:58px;
      text-align:left;
      background:var(--card);
      color:var(--text);
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px 16px;
      box-shadow:none;
    }
    .setButton:hover{
      background:#fff;
      border-color:var(--primary-soft);
      box-shadow:0 2px 5px rgba(29,27,32,.14), 0 10px 22px rgba(103,80,164,.1);
    }
    .setButton strong{
      display:block;
      color:var(--primary);
      font-size:18px;
      line-height:1.2;
    }
    .setButton span{
      display:block;
      color:var(--muted);
      font-size:13px;
      line-height:1.35;
      margin-top:3px;
    }
    .overviewButton{
      margin-top:4px;
      background:#f3edff;
      border-color:#d7c8f5;
    }
    .overviewButton strong{
      color:#52358c;
    }
    .overviewList{
      padding:18px;
      display:grid;
      gap:18px;
    }
    .overviewUnit{
      border:1px solid var(--line);
      border-radius:14px;
      overflow:hidden;
      background:#fff;
    }
    .overviewUnitTitle{
      margin:0;
      padding:12px 14px;
      color:#fff;
      background:#34234e;
      font-size:17px;
      line-height:1.3;
    }
    .overviewItem{
      padding:14px;
      border-top:1px solid var(--line);
    }
    .overviewItem:first-of-type{
      border-top:0;
    }
    .overviewSet{
      display:inline-block;
      margin-bottom:7px;
      color:var(--primary);
      font-size:12px;
      font-weight:900;
    }
    .overviewUnitHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:12px 14px;
      background:#34234e;
    }
    .overviewUnitHead .overviewUnitTitle{
      padding:0;
      background:transparent;
    }
    .overviewUnitToggle,
    .overviewHintToggle{
      border:1px solid #d7c8f5;
      border-radius:9px;
      padding:7px 10px;
      background:#f3edff;
      color:#52358c;
      font-size:12px;
      font-weight:850;
      white-space:nowrap;
    }
    .overviewUnitToggle:hover,
    .overviewHintToggle:hover{
      background:#fff;
    }
    .overviewItemTop{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .overviewAudio{
      width:min(100%, 420px);
      height:34px;
    }
    .overviewAudioGroup{
      display:flex;
      align-items:center;
      gap:8px;
      width:min(100%, 470px);
    }
    .overviewColumnLabel{
      color:var(--muted);
      font-size:12px;
      font-weight:900;
      white-space:nowrap;
    }
    .overviewHintToggle{
      margin-top:10px;
    }
    .overviewHintPieces{
      display:grid;
      gap:8px;
      margin-top:10px;
    }
    .overviewHintButtons{
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:8px;
    }
    .overviewHintStack{
      display:grid;
      gap:8px;
      margin-top:8px;
    }
    .overviewHintToggle{
      justify-self:start;
      width:100%;
      margin-top:0;
      padding:8px 5px;
      overflow-wrap:anywhere;
    }
    .overviewHintButtons .overviewHintToggle:nth-child(1){
      background:linear-gradient(135deg, #e7f1ff, #cfe0ff);
      border-color:#a8c6f5;
      color:#285b9c;
    }
    .overviewHintButtons .overviewHintToggle:nth-child(2){
      background:linear-gradient(135deg, #e8faef, #c9efd8);
      border-color:#a6d9b8;
      color:#287246;
    }
    .overviewHintButtons .overviewHintToggle:nth-child(3){
      background:linear-gradient(135deg, #fff1df, #ffd8ae);
      border-color:#f2bd7d;
      color:#9a5b16;
    }
    .overviewHint{
      display:none;
      margin-top:12px;
      padding:12px;
      border-left:3px solid #d7c8f5;
      background:#faf8ff;
    }
    .overviewChoiceList{
      display:grid;
      gap:8px;
    }
    .overviewChoice{
      margin:0;
      padding:9px 10px;
      border-radius:9px;
      background:#fff;
      border:1px solid #e7e0ec;
      line-height:1.5;
    }
    .overviewHint.show{
      display:block;
    }
    .overviewPrompt,
    .overviewAnswer,
    .overviewJa,
    .overviewIpa{
      margin:5px 0 0;
      line-height:1.55;
    }
    .overviewPrompt{ color:var(--muted); }
    .overviewAnswer{ color:var(--text); font-weight:800; }
    .overviewJa,
    .overviewIpa{ color:var(--muted); font-size:14px; }
    .scrollTopBtn{
      position:fixed;
      right:18px;
      bottom:18px;
      z-index:20;
      width:46px;
      height:46px;
      display:grid;
      place-items:center;
      border:1px solid #cdbbea;
      border-radius:50%;
      background:linear-gradient(135deg, #f1e9ff, #d8c4ff);
      color:#52358c;
      font-size:24px;
      font-weight:900;
      line-height:1;
      box-shadow:0 6px 16px rgba(64,42,105,.2);
    }
    .scrollTopBtn:hover{
      background:linear-gradient(135deg, #fff7ff, #cdb5ff);
    }
    .modeCard{
      width:100%;
      min-height:160px;
      text-align:left;
      background:transparent;
      color:var(--text);
      border:0;
      border-radius:0;
      padding:0;
      overflow:visible;
      box-shadow:none;
    }
    .modeThumb{
      margin-bottom:0;
      border-radius:20px;
    }
    .modeCard strong{
      display:none;
      font-size:22px;
      line-height:1.1;
      margin:0 18px 10px;
    }
    .modeCard span{
      display:none;
      color:var(--muted);
      font-size:15px;
      line-height:1.6;
      margin:0 18px;
    }
    .modeCard:hover{
      border-color:transparent;
      background:transparent;
    }
    .modeCard.textMode{
      min-height:118px;
      padding:22px;
      border-radius:20px;
      border:1px solid var(--line);
      background:var(--card);
      box-shadow:var(--shadow);
    }
    .modeCard.textMode strong,
    .modeCard.textMode span{
      display:block;
      margin-left:0;
      margin-right:0;
    }
    .modeCard.textMode:hover{
      border-color:var(--primary-soft);
      background:#fff;
    }
    .top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:16px 18px;
      border-bottom:2px solid var(--line);
      flex-wrap:wrap;
    }
    .meter{
      color:var(--muted);
      font-size:14px;
      font-weight:800;
    }
    .body{ padding:20px 18px 22px; }
    .questionMeta{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }
    .tag{
      border-radius:999px;
      padding:7px 11px;
      background:var(--primary-soft);
      color:var(--primary-dark);
      font-size:13px;
      font-weight:800;
    }
    .audioBox{
      display:block;
      margin-bottom:18px;
      padding:14px;
      border:2px solid var(--line);
      border-radius:22px;
      background:
        linear-gradient(135deg, rgba(103,80,164,.12), rgba(0,106,106,.1)),
        var(--card);
      box-shadow:var(--shadow);
    }
    .audioBox audio{
      display:block;
      width:100%;
      min-height:42px;
    }
    .audioSpeed{
      display:flex;
      gap:8px;
      margin-top:12px;
    }
    .speedBtn{
      min-height:36px;
      padding:0 14px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--primary-dark);
      box-shadow:none;
      font-size:13px;
      font-weight:950;
    }
    .speedBtn.active{
      border-color:var(--primary);
      background:var(--primary);
      color:#fff;
    }
    .replayAudioBtn{
      width:100%;
      margin-top:10px;
      min-height:42px;
      border-radius:14px;
      background:#fff;
      color:var(--primary-dark);
      border:1px solid var(--line);
      box-shadow:none;
      font-size:14px;
      font-weight:950;
    }
    .playerBody{
      padding:20px 18px 22px;
      display:grid;
      gap:16px;
    }
    .playerCard{
      border:1px solid var(--line);
      border-radius:22px;
      padding:18px;
      background:var(--card);
      box-shadow:var(--shadow);
    }
    .playerEyebrow{
      margin:0 0 8px;
      color:var(--primary-dark);
      font-size:12px;
      line-height:1;
      font-weight:950;
      letter-spacing:.05em;
    }
    .playerTitle{
      margin:0 0 8px;
      color:var(--text);
      font-size:22px;
      line-height:1.3;
      font-weight:950;
    }
    .playerJa{
      margin:0;
      color:var(--muted);
      font-size:15px;
      line-height:1.65;
      font-weight:800;
    }
    .playerControls{
      display:grid;
      grid-template-columns:1fr 1.4fr 1fr;
      gap:10px;
      align-items:center;
    }
    .playerControls button{
      min-height:52px;
    }
    .playerSeek{
      width:100%;
      accent-color:var(--primary);
    }
    .playerList{
      display:grid;
      gap:8px;
    }
    .playerTrack{
      width:100%;
      display:grid;
      grid-template-columns:auto 1fr;
      gap:10px;
      align-items:start;
      text-align:left;
      padding:12px;
      border-radius:14px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      box-shadow:none;
    }
    .playerTrack.active{
      border-color:var(--primary);
      background:var(--primary-soft);
      color:var(--primary-dark);
    }
    .playerTrackNum{
      font-weight:950;
      color:var(--primary);
      font-size:13px;
      line-height:1.4;
    }
    .playerTrackText{
      min-width:0;
      font-size:13px;
      line-height:1.45;
      font-weight:850;
    }
    .playerTrackText span{
      display:block;
      margin-top:3px;
      color:var(--muted);
      font-size:12px;
      font-weight:750;
    }
    .blankSentence{
      font-size:21px;
      line-height:1.65;
      font-weight:900;
      margin:0 0 18px;
      padding:18px;
      border:2px solid var(--line);
      border-radius:16px;
      background:var(--card);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.9);
      overflow-wrap:anywhere;
    }
    .promptSentence{
      display:inline-flex;
      width:max-content;
      color:var(--primary-dark);
      background:var(--primary-soft);
      border:2px solid transparent;
      border-radius:999px;
      font-size:12px;
      line-height:1;
      font-weight:900;
      padding:7px 10px;
      margin-bottom:14px;
    }
    .answerSentence{
      display:block;
      letter-spacing:.01em;
    }
    .listeningNotice{
      display:block;
      margin-top:10px;
      color:var(--muted);
      font-size:13px;
      line-height:1.65;
      font-weight:800;
    }
    .sentenceJa{
      display:block;
      color:var(--muted);
      font-size:15px;
      line-height:1.6;
      font-weight:800;
      margin-top:8px;
    }
    .choiceInner{
      display:grid;
      grid-template-columns:38px 1fr;
      gap:12px;
      align-items:start;
    }
    .choiceNumber{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:34px;
      height:34px;
      border-radius:50%;
      background:var(--primary-soft);
      color:var(--primary-dark);
      font-size:16px;
      font-weight:950;
      margin-top:1px;
    }
    .choiceEn{
      display:block;
      font-size:17px;
      line-height:1.55;
      overflow-wrap:anywhere;
    }
    .blank{
      display:inline-block;
      min-width:110px;
      border-bottom:3px solid var(--text);
      transform:translateY(3px);
    }
    .choices{
      display:grid;
      gap:14px;
    }
    .ratings{
      display:none;
      gap:14px;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      margin-top:22px;
    }
    .ratings.show{ display:grid; }
    .ratings .choice{
      text-align:center;
      padding:17px 8px 16px;
      min-height:98px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:7px;
      border-width:0;
      font-size:15px;
      letter-spacing:.02em;
      position:relative;
      overflow:hidden;
      text-transform:uppercase;
    }
    .ratings .choice::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(180deg, rgba(255,255,255,.2), rgba(255,255,255,0) 48%);
      pointer-events:none;
    }
    .ratings .choice::after{
      content:"";
      position:absolute;
      right:12px;
      bottom:10px;
      width:34px;
      height:34px;
      border-radius:50%;
      background:rgba(255,255,255,.16);
      pointer-events:none;
    }
    .rating-mark{
      display:block;
      width:auto;
      height:auto;
      display:grid;
      place-items:center;
      background:transparent;
      box-shadow:none;
      font-size:34px;
      line-height:1;
      font-weight:950;
      line-height:1;
      position:relative;
      z-index:1;
    }
    .ratings .choice span:not(.rating-mark){
      position:relative;
      z-index:1;
      font-size:16px;
      font-weight:950;
      color:#fff;
      text-shadow:0 1px 2px rgba(0,0,0,.16);
    }
    .ratings .choice[data-rating="good"]{
      background:linear-gradient(180deg, #7965b8 0%, var(--primary) 100%);
      color:#fff;
      box-shadow:0 6px 0 var(--primary-dark), 0 14px 24px rgba(103,80,164,.24);
    }
    .ratings .choice[data-rating="ok"]{
      background:linear-gradient(180deg, #078080 0%, var(--secondary) 100%);
      color:#fff;
      box-shadow:0 6px 0 #005252, 0 14px 24px rgba(0,106,106,.22);
    }
    .ratings .choice[data-rating="review"]{
      background:linear-gradient(180deg, #965f70 0%, var(--tertiary) 100%);
      color:#fff;
      box-shadow:0 6px 0 #5f3d49, 0 14px 24px rgba(125,82,96,.22);
    }
    .ratings .choice[data-rating="good"] .rating-mark{
      color:#fff;
    }
    .ratings .choice[data-rating="ok"] .rating-mark{
      color:#fff;
      font-size:32px;
    }
    .ratings .choice[data-rating="review"] .rating-mark{
      color:#fff;
      font-size:38px;
    }
    .ratings .choice:hover{
      transform:translateY(-1px);
    }
    .ratings .choice[data-rating="good"].correct,
    .ratings .choice[data-rating="ok"].correct{
      outline:3px solid rgba(88,204,2,.22);
    }
    .ratings .choice[data-rating="review"].wrong{
      outline:3px solid rgba(255,75,75,.2);
    }
    .choice{
      width:100%;
      text-align:left;
      background:var(--card);
      color:var(--text);
      border:2px solid #dce8d6;
      border-radius:16px;
      padding:17px;
      font-weight:900;
      line-height:1.55;
      box-shadow:0 1px 2px rgba(29,27,32,.14);
    }
    .choice:hover{
      border-color:var(--primary-soft);
      background:#fff;
    }
    .choice.correct{
      border-color:rgba(10,127,66,.45);
      background:var(--green-soft);
      color:#064c2a;
    }
    .choice.wrong{
      border-color:rgba(180,35,24,.45);
      background:rgba(180,35,24,.08);
      color:#7a1b13;
    }
    .answer{
      margin-top:20px;
      padding:18px;
      border:2px solid #dce8d6;
      border-radius:16px;
      background:var(--card);

    function parseCSV(text){
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;
      for (let i = 0; i < text.length; i++){
        const ch = text[i];
        const next = text[i + 1];
        if (ch === '"' && inQuotes && next === '"'){
          cell += '"';
          i++;
        } else if (ch === '"'){
          inQuotes = !inQuotes;
        } else if (ch === "," && !inQuotes){
          row.push(cell);
          cell = "";
        } else if ((ch === "\n" || ch === "\r") && !inQuotes){
          if (ch === "\r" && next === "\n") i++;
          row.push(cell);
          if (row.some(v => v.trim() !== "")) rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += ch;
        }
      }
      if (cell || row.length){
        row.push(cell);
        rows.push(row);
      }
      const headers = rows.shift();
      return rows.map(r => Object.fromEntries(headers.map((h, i) => [h, r[i] ?? ""])));
    }

    function shuffle(items){
      const arr = [...items];
      for (let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function escapeRegExp(text){
      return text.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function verbForms(verb){
      const forms = {
        be: ["be", "is", "was", "been", "being"],
        break: ["break", "breaks", "broke", "broken", "breaking"],
        bring: ["bring", "brings", "brought", "brought", "bringing"],
        call: ["call", "calls", "called", "called", "calling"],
        check: ["check", "checks", "checked", "checked", "checking"],
        come: ["come", "comes", "came", "come", "coming"],
        do: ["do", "does", "did", "done", "doing"],
        drop: ["drop", "drops", "dropped", "dropped", "dropping"],
        fill: ["fill", "fills", "filled", "filled", "filling"],
        give: ["give", "gives", "gave", "given", "giving"],
        go: ["go", "goes", "went", "gone", "going"],
        hang: ["hang", "hangs", "hung", "hung", "hanging"],
        hold: ["hold", "holds", "held", "held", "holding"],
        keep: ["keep", "keeps", "kept", "kept", "keeping"],
        look: ["look", "looks", "looked", "looked", "looking"],
        pass: ["pass", "passes", "passed", "passed", "passing"],
        put: ["put", "puts", "put", "put", "putting"],
        run: ["run", "runs", "ran", "run", "running"],
        take: ["take", "takes", "took", "taken", "taking"],
        turn: ["turn", "turns", "turned", "turned", "turning"],
        wait: ["wait", "waits", "waited", "waited", "waiting"],
        wear: ["wear", "wears", "wore", "worn", "wearing"],
        work: ["work", "works", "worked", "worked", "working"],
        wrap: ["wrap", "wraps", "wrapped", "wrapped", "wrapping"]
      };
      return forms[verb.toLowerCase()] || [verb, `${verb}s`, `${verb}ed`, `${verb}ed`, `${verb}ing`];
    }

    function verbPattern(verb){
      const candidates = [...new Set(verbForms(verb))];
      return `(?:${candidates.map(escapeRegExp).join("|")})`;
    }

    function blankOut(card){
      const phrase = card.theme.trim();
      const direct = new RegExp(escapeRegExp(phrase).replace(/\s+/g, "\\s+"), "i");
      if (direct.test(card.en)) return card.en.replace(direct, '<span class="blank"></span>');
      const words = phrase.toLowerCase().split(/\s+/);
      if (words.length >= 2){
        const separated = new RegExp(
          `\\b${verbPattern(words[0])}(?:\\s+[A-Za-z'’-]+){0,4}\\s+${words.slice(1).map(escapeRegExp).join("\\s+")}\\b`,
          "i"
        );
        if (separated.test(card.en)) return card.en.replace(separated, '<span class="blank"></span>');
      }
      return card.en.replace(/\b[a-z]+\b/i, '<span class="blank"></span>');
    }

    function replacementForm(match, replacement, offset = 0, sentence = "", sourceParticleCount = null){
      if (!match) return replacement;
      const matchParts = match.trim().split(/\s+/);
      const sourceVerb = matchParts[0].toLowerCase();
      const replacementParts = replacement.split(/\s+/);
      const targetForms = verbForms(replacementParts[0]);
      const before = sentence.slice(Math.max(0, offset - 18), offset).toLowerCase();
      const isPassive = /\b(?:am|are|is|was|were|be|been|being)\s+$/.test(before);
      const sourceForms = Object.values({
        break: verbForms("break"), bring: verbForms("bring"), call: verbForms("call"), check: verbForms("check"),
        come: verbForms("come"), do: verbForms("do"), drop: verbForms("drop"), fill: verbForms("fill"), hang: verbForms("hang"),
        give: verbForms("give"), go: verbForms("go"), hold: verbForms("hold"), keep: verbForms("keep"),
        look: verbForms("look"), pass: verbForms("pass"), put: verbForms("put"), run: verbForms("run"),
        take: verbForms("take"), turn: verbForms("turn"), wait: verbForms("wait"), wear: verbForms("wear"),
        work: verbForms("work"), wrap: verbForms("wrap")
      });
      let formIndex = 0;
      for (const forms of sourceForms){
        const hit = forms.findIndex(form => form === sourceVerb);
        if (hit >= 0){
          formIndex = isPassive && hit === 2 ? 3 : hit;
          break;
        }
      }
      replacementParts[0] = targetForms[formIndex] || targetForms[0];
      const particleCount = sourceParticleCount ?? Math.max(1, replacementParts.length - 1);
      const middle = matchParts.slice(1, Math.max(1, matchParts.length - particleCount));
      const adjusted = [replacementParts[0], ...middle, ...replacementParts.slice(1)].join(" ");
      return /^[A-Z]/.test(match)
        ? adjusted.charAt(0).toUpperCase() + adjusted.slice(1)
        : adjusted;
    }

    function replaceTheme(sentence, theme, replacement){
      const direct = new RegExp(escapeRegExp(theme).replace(/\s+/g, "\\s+"), "i");
      if (direct.test(sentence)) return sentence.replace(direct, (match, offset) => replacementForm(match, replacement, offset, sentence));
      const words = theme.toLowerCase().split(/\s+/);
      if (words.length >= 2){
        const separated = new RegExp(
          `\\b${verbPattern(words[0])}(?:\\s+[A-Za-z'’-]+){0,4}\\s+${words.slice(1).map(escapeRegExp).join("\\s+")}\\b`,
          "i"
        );
        if (separated.test(sentence)) return sentence.replace(separated, (match, offset) => replacementForm(match, replacement, offset, sentence, words.length - 1));
      }
      return sentence;
    }

    function escapeHTML(text){
      return String(text ?? "").replace(/[&<>"']/g, ch => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[ch]));
    }

    function makeParaphraseChoices(card){
      const seen = new Set([card.en]);
      const choices = [{ label: card.en, ja: card.ja, value: card.en, correct: true }];
      const themes = shuffle([...new Set([...PARAPHRASE_SETS.map(c => c.theme).filter(Boolean), ...DISTRACTOR_THEMES])]);
      for (const theme of themes){
        if (theme === card.theme) continue;
        const label = replaceTheme(card.en, card.theme, theme.toLowerCase());
        if (!label || seen.has(label)) continue;
        seen.add(label);
        choices.push({ label, value: label, correct: false });
        if (choices.length === 3) break;
      }
      return shuffle(choices).map((choice, index) => ({ ...choice, number: index + 1 }));
    }

    function addReviewCard(rating, card){
      if (rating !== "ok" && rating !== "review") return;
      const deck = state.reviewDecks[rating];
      const existing = deck.findIndex(item => item.id === card.id);
      if (existing >= 0) deck.splice(existing, 1);
      deck.push(card);
    }

    function inRange(card, range = state.activeRange){
      const unit = Number(card.unit);
      return unit >= range.min && unit <= range.max;
    }

    function rangeForKey(key){
      return TEST_RANGES.find(range => range.key === key) || DEFAULT_RANGE;
    }

    function sourceForMode(mode, range = state.activeRange){
      const source = mode === "paraphrase" ? PARAPHRASE_SETS : LISTENING_SETS;
      return source.filter(card => inRange(card, range));
    }

    function renderBottomSetNav(activeSet = null){
      const isListening = state.mode === "listening";
      els.bottomSetNav.classList.toggle("paraphraseNav", !isListening);
      const sets = isListening ? [1, 2, 3, 4, 5] : [1, 2, 3, 4];
      const setButtons = sets.map(set => `
        <button class="bottomSetBtn ${set === activeSet ? "active" : ""} ${isListening && set >= 4 ? "wide" : ""}" type="button" data-set="${set}">
          ${isListening ? `SET ${set}` : `#${set}`}
        </button>
      `).join("");
      els.bottomSetNav.innerHTML = isListening ? `${setButtons}
        <button class="bottomSetBtn" type="button" data-top="true">TOP</button>
        <button class="bottomSetBtn compact ${activeSet === "ok" ? "active" : ""}" type="button" data-review="ok" ${state.reviewDecks.ok.length ? "" : "disabled"}>△</button>
        <button class="bottomSetBtn compact ${activeSet === "review" ? "active" : ""}" type="button" data-review="review" ${state.reviewDecks.review.length ? "" : "disabled"}>×</button>
      ` : `${setButtons}
        <button class="bottomSetBtn" type="button" data-top="true">TOP</button>
      `;
      [...els.bottomSetNav.querySelectorAll(".bottomSetBtn")].forEach(btn => {
        if (btn.dataset.set) btn.addEventListener("click", () => makeQuiz(state.mode, Number(btn.dataset.set), state.activeRange));
        if (btn.dataset.review) btn.addEventListener("click", () => makeReviewQuiz(btn.dataset.review));
        if (btn.dataset.top) btn.addEventListener("click", showModePicker);
      });
    }

    function showBottomSetNav(activeSet = null){
      renderBottomSetNav(activeSet);
      els.bottomSetNav.classList.remove("hidden");
    }

    function hideBottomSetNav(){
      els.bottomSetNav.classList.add("hidden");
    }

    function renderSetPicker(mode = "listening"){
      state.mode = mode;
      state.activeRange = DEFAULT_RANGE;
      const ranges = mode === "paraphrase" ? PARAPHRASE_RANGES : TEST_RANGES;
      els.modePanel.classList.add("hidden");
      els.quizPanel.classList.add("hidden");
      els.overviewPanel.classList.add("hidden");
      els.playerPanel.classList.add("hidden");
      els.setPanel.classList.remove("hidden");
      els.pageSub.textContent = "";
      els.setHeroThumb.classList.toggle("hidden", mode === "player");
      els.setHeroThumb.src = mode === "listening" ? "../assets/thumb-listening.png?v=2" : "../assets/thumb-paraphrase.png?v=2";
      els.setHeroLabel.textContent = "";
      els.setHeroTitle.textContent = "";
      if (mode === "player") hideBottomSetNav();
      else showBottomSetNav();
      els.setGrid.innerHTML = ranges.map(range => {
        const source = sourceForMode(mode, range);
        const setCards = [...new Set(source.map(card => card.set))]
          .filter(set => mode !== "paraphrase" || set <= 4)
          .sort((a, b) => a - b);
        if (!setCards.length) return "";
        return `
          <div class="rangeBlock">
            <h2 class="rangeTitle">${range.label}</h2>
            ${range.note ? `<p class="rangeNote">${range.note}</p>` : ""}
            ${setCards.map(set => `
              <button class="setButton" type="button" data-set="${set}" data-range="${range.key}">
                <strong>Set ${set}</strong>
              </button>
            `).join("")}
            <button class="setButton overviewButton" type="button" data-overview="true" data-range="${range.key}">
              <strong>一覧確認</strong>
            </button>
          </div>
        `;
      }).join("");
      [...els.setGrid.querySelectorAll(".setButton[data-set]")].forEach(btn => {
        btn.addEventListener("click", () => {
          const set = Number(btn.dataset.set);
          const range = rangeForKey(btn.dataset.range);
          makeQuiz(mode, set, range);
        });
      });
      [...els.setGrid.querySelectorAll(".overviewButton")].forEach(btn => {
        btn.addEventListener("click", () => showOverview(mode, rangeForKey(btn.dataset.range)));
      });
    }

    function showOverview(mode, range){
      state.mode = mode;
      state.activeRange = range;
      const cards = sourceForMode(mode, range)
        .slice()
        .sort((a, b) => Number(a.unit) - Number(b.unit) || Number(a.set) - Number(b.set));
      const units = new Map();
      cards.forEach(card => {
        if (!units.has(card.unit)) units.set(card.unit, []);
        units.get(card.unit).push(card);
      });
      els.modePanel.classList.add("hidden");
      els.setPanel.classList.add("hidden");
      els.quizPanel.classList.add("hidden");
      els.playerPanel.classList.add("hidden");
      els.overviewPanel.classList.remove("hidden");
      els.overviewTitle.textContent = `${mode === "listening" ? "LISTENING" : "PARAPHRASE"} · ${range.label}`;
      els.overviewList.innerHTML = [...units.entries()].map(([unit, unitCards]) => `
        <section class="overviewUnit" data-overview-unit="${escapeHTML(unit)}">
          <div class="overviewUnitHead">
            <h2 class="overviewUnitTitle">UNIT ${String(unit).padStart(2, "0")} · ${escapeHTML(unitCards[0].theme)}</h2>
            <button class="overviewUnitToggle" type="button" data-hint-all="false">ヒントをすべて表示</button>
          </div>
          ${unitCards.map(card => `
            <article class="overviewItem">
              <div class="overviewItemTop">
                <span class="overviewSet">SET ${card.set}</span>
                ${mode === "listening" && card.audioUrl ? `<span class="overviewAudioGroup"><audio class="overviewAudio" controls preload="none" src="${escapeHTML(card.audioUrl)}"></audio></span>` : ""}
              </div>
              ${mode === "paraphrase" ? `<p class="overviewPrompt"><strong>問題：</strong>${escapeHTML(card.prompt)}</p>` : ""}
              ${mode === "paraphrase" ? `
                <div class="overviewHintPieces">
                  <div class="overviewHintButtons">
                    <button class="overviewHintToggle" type="button" data-hint-index="0" data-hint-label="選択肢">選択肢を表示</button>
                    <button class="overviewHintToggle" type="button" data-hint-index="1" data-hint-label="答え">答えを表示</button>
                    <button class="overviewHintToggle" type="button" data-hint-index="2" data-hint-label="日本語">日本語を表示</button>
                  </div>
                  <div class="overviewHintStack">
                    <div class="overviewHint overviewChoices" data-hint-index="0">
                      <div class="overviewChoiceList">
                        ${makeParaphraseChoices(card).map(choice => `<p class="overviewChoice">${escapeHTML(choice.label)}</p>`).join("")}
                      </div>
                    </div>
                    <p class="overviewHint overviewAnswer" data-hint-index="1"><strong>${escapeHTML(card.en)}</strong></p>
                    <p class="overviewHint overviewJa" data-hint-index="2">${escapeHTML(card.ja)}</p>
                  </div>
                </div>
              ` : `
                <div class="overviewHintPieces">
                  <div class="overviewHintButtons">
                    <button class="overviewHintToggle" type="button" data-hint-index="0" data-hint-label="英文">英文を表示</button>
                    <button class="overviewHintToggle" type="button" data-hint-index="1" data-hint-label="日本語">日本語を表示</button>
                    <button class="overviewHintToggle" type="button" data-hint-index="2" data-hint-label="発音記号">発音記号を表示</button>
                  </div>
                  <div class="overviewHintStack">
                    <p class="overviewHint overviewAnswer" data-hint-index="0"><strong>${escapeHTML(card.en)}</strong></p>
                    <p class="overviewHint overviewJa" data-hint-index="1">${escapeHTML(card.ja)}</p>
                    <p class="overviewHint overviewIpa" data-hint-index="2">${escapeHTML(card.ipa || "")}</p>
                  </div>
                </div>
              `}
            </article>
          `).join("")}
        </section>
      `).join("");
      [...els.overviewList.querySelectorAll(".overviewHintToggle")].forEach(button => {
        button.addEventListener("click", () => {
          const item = button.closest(".overviewItem");
          const hint = item.querySelector(`.overviewHint[data-hint-index="${button.dataset.hintIndex}"]`);
          const show = !hint.classList.contains("show");
          hint.classList.toggle("show", show);
          button.textContent = `${button.dataset.hintLabel}${show ? "を隠す" : "を表示"}`;
        });
      });
      [...els.overviewList.querySelectorAll(".overviewUnitToggle")].forEach(button => {
        button.addEventListener("click", () => {
          const unit = button.closest(".overviewUnit");
          const hints = [...unit.querySelectorAll(".overviewHint")];
          const show = button.dataset.hintAll !== "true";
          hints.forEach(hint => hint.classList.toggle("show", show));
          unit.querySelectorAll(".overviewHintToggle").forEach(item => {
            const card = item.closest(".overviewItem");
            const hint = card.querySelector(`.overviewHint[data-hint-index="${item.dataset.hintIndex}"]`);
            hint.classList.toggle("show", show);
            item.textContent = `${item.dataset.hintLabel}${show ? "を隠す" : "を表示"}`;
          });
          button.dataset.hintAll = String(show);
          button.textContent = show ? "ヒントをすべて隠す" : "ヒントをすべて表示";
        });
      });
      els.pageSub.textContent = "一覧確認";
      hideBottomSetNav();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function showModePicker(){
      state.mode = null;
      clearPlayerTimer();
      els.playerAudio.pause();
      els.modePanel.classList.remove("hidden");
      els.setPanel.classList.add("hidden");
      els.quizPanel.classList.add("hidden");
      els.overviewPanel.classList.add("hidden");
      els.playerPanel.classList.add("hidden");
      els.pageSub.textContent = "モードを選んで挑戦してください！";
      hideBottomSetNav();
    }

    function sortedListeningSet(set, range = state.activeRange){
      return LISTENING_SETS
        .filter(card => Number(card.set) === Number(set) && inRange(card, range))
        .sort((a, b) => Number(a.unit) - Number(b.unit));
    }

    function makePlayer(selectedSet = 1, range = state.activeRange){
      state.mode = "player";
      state.activeSet = selectedSet;
      state.activeRange = range;
      state.playerDeck = sortedListeningSet(selectedSet, range);
      state.playerIndex = 0;
      els.modePanel.classList.add("hidden");
      els.setPanel.classList.add("hidden");
      els.quizPanel.classList.add("hidden");
      els.playerPanel.classList.remove("hidden");
      els.pageSub.textContent = "LISTENING MODEの音声をプレイヤーで確認";
      hideBottomSetNav();
      renderPlayerTrack(false);
    }

    function renderPlayerList(){
      els.playerList.innerHTML = state.playerDeck.map((card, index) => `
        <button class="playerTrack ${index === state.playerIndex ? "active" : ""}" type="button" data-index="${index}">
          <span class="playerTrackNum">U${Number(card.unit)}</span>
          <span class="playerTrackText">${escapeHTML(card.en)}<span>${escapeHTML(card.ja)}</span></span>
        </button>
      `).join("");
      [...els.playerList.querySelectorAll(".playerTrack")].forEach(btn => {
        btn.addEventListener("click", () => {
          state.playerIndex = Number(btn.dataset.index);
          renderPlayerTrack(true);
        });
      });
    }

    function renderPlayerTrack(autoplay = false){
      const card = state.playerDeck[state.playerIndex];
      if (!card) return;
      clearPlayerTimer();
      els.playerMeter.textContent = `Track ${state.playerIndex + 1} / ${state.playerDeck.length}`;
      els.playerSetLabel.textContent = `SET ${state.activeSet} · UNIT ${String(card.unit).padStart(2, "0")}`;
      els.playerTitle.textContent = card.en;
      els.playerJa.textContent = card.ja;
      setMediaSource(els.playerAudio, card.audioUrl);
      els.playerSeek.value = "0";
      els.playerPlayBtn.textContent = "Play";
      renderPlayerList();
      if (autoplay) playCurrentPlayerAudio();
    }

    function playCurrentPlayerAudio(){
      if (!els.playerAudio.src) return;
      const playback = els.playerAudio.play();
      if (playback?.catch) playback.catch(() => {});
      els.playerPlayBtn.textContent = "Pause";
    }

    function pausePlayerAudio(){
      els.playerAudio.pause();
      els.playerPlayBtn.textContent = "Play";
    }

    function nextPlayerTrack(autoplay = false){
      if (!state.playerDeck.length) return;
      clearPlayerTimer();
      state.playerIndex = (state.playerIndex + 1) % state.playerDeck.length;
      renderPlayerTrack(autoplay);
    }

    function prevPlayerTrack(){
      if (!state.playerDeck.length) return;
      state.playerIndex = (state.playerIndex - 1 + state.playerDeck.length) % state.playerDeck.length;
      renderPlayerTrack(true);
    }

    function makeQuiz(mode = state.mode, selectedSet = null, range = state.activeRange){
      state.mode = mode;
      clearPlayerTimer();
      state.activeSet = selectedSet;
      state.activeRange = range;
      state.quiz = state.mode === "listening"
        ? shuffle(LISTENING_SETS.filter(card => inRange(card, range) && (selectedSet ? card.set === selectedSet : true)))
        : shuffle(PARAPHRASE_SETS.filter(card => inRange(card, range) && (selectedSet ? card.set === selectedSet : true)));
      state.index = 0;
      state.selected = null;
      state.score = 0;
      state.log = [];
      els.modePanel.classList.add("hidden");
      els.setPanel.classList.add("hidden");
      els.overviewPanel.classList.add("hidden");
      els.playerPanel.classList.add("hidden");
      els.playerAudio.pause();
      els.quizPanel.classList.remove("hidden");
      els.quizPanel.classList.toggle("mode-listening", state.mode === "listening");
      els.quizPanel.classList.toggle("mode-paraphrase", state.mode === "paraphrase");
      els.pageSub.textContent = state.mode === "listening"
        ? "リスニングをして理解度を３段階評価しよう"
        : "与えられた英文をphrasal verbで言い換えよう";
      if (state.mode === "listening" || state.mode === "paraphrase") showBottomSetNav(selectedSet);
      else hideBottomSetNav();
      els.result.classList.remove("show");
      document.querySelector(".body").style.display = "";
      document.querySelector(".top").style.display = "";
      renderQuestion();
    }

    function makeReviewQuiz(kind){
      const deck = state.reviewDecks[kind];
      if (!deck.length) return;
      clearPlayerTimer();
      state.mode = "listening";
      state.activeSet = kind;
      state.quiz = shuffle(deck);
      state.index = 0;
      state.selected = null;
      state.score = 0;
      state.log = [];
      els.modePanel.classList.add("hidden");
      els.setPanel.classList.add("hidden");
      els.overviewPanel.classList.add("hidden");
      els.quizPanel.classList.remove("hidden");
      els.playerPanel.classList.add("hidden");
      els.playerAudio.pause();
      els.quizPanel.classList.add("mode-listening");
      els.quizPanel.classList.remove("mode-paraphrase");
      els.pageSub.textContent = kind === "ok" ? "△をつけた問題を復習" : "×をつけた問題を復習";
      showBottomSetNav(kind);
      els.result.classList.remove("show");
      document.querySelector(".body").style.display = "";
      document.querySelector(".top").style.display = "";
      renderQuestion();
    }

    function makeChoices(card){
      const themes = [...new Set([...state.cards, ...PARAPHRASE_SETS].map(c => c.theme).filter(Boolean))];
      const wrong = shuffle(themes.filter(theme => theme !== card.theme)).slice(0, 3);
      return shuffle([card.theme, ...wrong]);
    }

    function renderQuestion(){
      const card = state.quiz[state.index];
      state.selected = null;
      state.answerNumber = null;
      els.answer.classList.remove("show");
      els.feedback.className = "feedback";
      els.feedback.textContent = "";
      els.prevBtn.classList.toggle("hidden", state.mode === "listening");
      els.prevBtn.disabled = state.index === 0;
      els.nextBtn.disabled = state.mode === "listening";
      els.showBtn.disabled = false;
      els.showBtn.classList.toggle("hidden", state.mode !== "listening");
      els.meter.textContent = `Question ${state.index + 1} / ${state.quiz.length}`;
      els.unitTag.classList.toggle("hidden", state.mode === "listening");
      els.unitTag.textContent = state.mode === "listening" ? "" : `Unit ${String(card.unit).padStart(2, "0")}`;
      state.audioAttempt++;
      setMediaSource(els.audio, card.audioUrl);
      els.audio.parentElement.classList.toggle("hidden", !card.audioUrl);
      els.replayBtn.classList.toggle("hidden", !card.audioUrl);
      resetAudioUI();
      els.answerEn.textContent = card.en;
      els.answerJa.textContent = card.ja;
      els.answerIpa.classList.toggle("hidden", state.mode === "paraphrase");
      els.answerIpa.textContent = card.ipa;
      els.answerUnit.textContent = `UNIT ${String(card.unit).padStart(2, "0")}`;
      els.choices.innerHTML = "";
      els.ratings.classList.remove("show");
      [...els.ratings.children].forEach(btn => {
        btn.disabled = false;
        btn.classList.remove("correct", "wrong");
      });
      if (state.mode === "listening"){
        els.themeTag.textContent = `SET ${card.set}`;
        els.blankSentence.innerHTML = `
          <span class="answerSentence">音声を聞いて、内容をイメージしてください。</span>
        `;
        els.listeningNotice.classList.remove("hidden");
        els.nextBtn.classList.add("hidden");
        requestAnimationFrame(() => {
          playAudioFromStart();
        });
      } else {
        els.listeningNotice.classList.add("hidden");
        els.nextBtn.classList.remove("hidden");
        els.themeTag.textContent = `SET ${card.set}`;
        els.blankSentence.innerHTML = card.prompt
          ? `<span class="promptSentence">Original sentence</span><span class="answerSentence">${escapeHTML(card.prompt)}</span>`
          : blankOut(card);
        makeParaphraseChoices(card).forEach(choice => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "choice";
          btn.dataset.value = choice.value;
          btn.dataset.number = choice.number;
          if (choice.correct) state.answerNumber = choice.number;
          btn.innerHTML = `
            <span class="choiceInner">
              <span class="choiceNumber">${choice.number}</span>
              <span>
                <span class="choiceEn">${escapeHTML(choice.label)}</span>
              </span>
            </span>
          `;
          btn.addEventListener("click", () => choose(choice.value, btn));
          els.choices.appendChild(btn);
        });
      }
    }

    function choose(choice, btn){
      if (state.selected) return;
      const card = state.quiz[state.index];
      state.selected = choice;
      const correct = state.mode === "paraphrase" ? choice === card.en : choice === card.theme;
      if (correct) state.score++;
      state.log.push({ card, selected: choice, correct });
      els.feedback.textContent = correct
        ? "正解！"
        : `残念。正解は「${state.answerNumber}」でした。`;
      els.feedback.className = `feedback show ${correct ? "correct" : "wrong"}`;
      [...els.choices.children].forEach(child => {
        child.disabled = true;
        const value = state.mode === "paraphrase" ? child.dataset.value : child.textContent;
        if (value === (state.mode === "paraphrase" ? card.en : card.theme)) child.classList.add("correct");
      });
      if (!correct) btn.classList.add("wrong");
      showAnswer({ scroll: state.mode === "paraphrase" });
      els.nextBtn.disabled = false;
    }

    function rate(rating, btn){
      if (state.selected) return;
      const card = state.quiz[state.index];
      state.selected = rating;
      const correct = rating === "good";
      if (correct) state.score++;
      addReviewCard(rating, card);
      state.log.push({ card, selected: rating, correct, rating });
      [...els.ratings.children].forEach(child => {
        child.disabled = true;
        if (child === btn) child.classList.add(rating === "review" ? "wrong" : "correct");
      });
      renderBottomSetNav(state.activeSet);
      showAnswer();
      setTimeout(next, 220);
    }

    function showAnswer(options = {}){
      els.answer.classList.add("show");
      els.showBtn.disabled = true;
      if (state.mode === "listening"){
        els.ratings.classList.add("show");
        els.showBtn.classList.add("hidden");
        els.listeningNotice.classList.add("hidden");
      }
      if (options.scroll){
        requestAnimationFrame(() => {
          els.answer.scrollIntoView({ behavior: "smooth", block: "start" });
        });
      }
    }

    function next(){
      if (!state.selected){
        const card = state.quiz[state.index];
        state.log.push({ card, selected: null, correct: false });
      }
      if (state.index < state.quiz.length - 1){
        state.index++;
        renderQuestion();
      } else {
        showResult();
      }
    }

    function prev(){
      if (state.index > 0){
        state.index--;
        renderQuestion();
      }
    }

    function showResult(){
      document.querySelector(".body").style.display = "none";
      document.querySelector(".top").style.display = "none";
      els.result.classList.add("show");
      const wrongNumbers = state.log
        .map(item => item.correct ? null : `U${Number(item.card.unit)}`)
        .filter(Boolean);
      const isParaphrase = state.mode === "paraphrase";
      els.score.textContent = state.mode === "listening"
        ? `理解度: ${state.score} / ${state.quiz.length}`
        : `総合点数: ${state.score} / ${state.quiz.length}`;
      els.resultMessage.classList.toggle("show", isParaphrase);
      els.copyBox.classList.toggle("show", isParaphrase);
      if (isParaphrase){
        const wrongText = wrongNumbers.length ? wrongNumbers.join(", ") : "なし";
        els.copyText.value = [
          `Paraphrase mode｜SET ${state.activeSet ?? "-"}`,
          `総合点数: ${state.score} / ${state.quiz.length}`,
          `間違えた問題番号: ${wrongText}`
        ].join("\n");
      } else {
        els.copyText.value = "";
      }
      els.review.innerHTML = state.log.map((item, i) => `
        <div class="reviewItem">
          <strong>${i + 1}. ${item.correct ? "OK" : "Review"} - Unit ${String(item.card.unit).padStart(2, "0")} ${item.card.theme}</strong>
          <div>${item.card.en}</div>
          <div class="sub">${item.card.ja}</div>
        </div>
      `).join("");
      requestAnimationFrame(() => {
        els.score.scrollIntoView({ behavior: "smooth", block: "start" });
      });
    }

    function resetQuiz(){
      document.querySelector(".body").style.display = "";
      document.querySelector(".top").style.display = "";
      els.nextBtn.classList.remove("hidden");
      if (state.mode === "listening" || state.mode === "paraphrase") renderSetPicker(state.mode);
      else makeQuiz(state.mode);
    }

    async function init(){
      try{
        const text = await fetch(CSV_URL, { cache: "no-store" }).then(r => {
          if (!r.ok) throw new Error("CSV not found");
          return r.text();
        });
        state.cards = parseCSV(text)
          .filter(c => c.unit && c.audioUrl && Number(c.unit) >= 1 && Number(c.unit) <= 20);
        if (state.cards.length < QUESTION_COUNT) throw new Error("Not enough cards");
        els.meter.textContent = "Choose a mode";
      } catch (error){
        els.meter.textContent = "cards.csv を読み込めませんでした";
        els.choices.innerHTML = "";
      }
    }

    els.replayBtn.addEventListener("click", () => {
      playAudioFromStart();
    });
    function resetAudioUI(){
      els.replayBtn.textContent = "もう一度再生";
    }
    function syncAudioUI(){
      els.replayBtn.textContent = "もう一度再生";
    }
    function waitForAudioReady(audio, timeout = 3000){
      if (!audio.src || audio.readyState >= 2) return Promise.resolve();
      return new Promise(resolve => {
        let done = false;
        const finish = () => {
          if (done) return;
          done = true;
          audio.removeEventListener("canplay", finish);
          audio.removeEventListener("loadeddata", finish);
          audio.removeEventListener("error", finish);
          clearTimeout(timer);
          resolve();
        };
        const timer = setTimeout(finish, timeout);
        audio.addEventListener("canplay", finish, { once: true });
        audio.addEventListener("loadeddata", finish, { once: true });
        audio.addEventListener("error", finish, { once: true });
        audio.load();
      });
    }

    async function playAudioFromStart(){
      if (!els.audio.src) return false;
      const attempt = ++state.audioAttempt;
      els.replayBtn.textContent = "Loading...";
      try{
        els.audio.pause();
        els.audio.currentTime = 0;
      } catch (error){
        els.audio.load();
      }
      await waitForAudioReady(els.audio);
      if (attempt !== state.audioAttempt) return false;
      try{
        const playback = els.audio.play();
        if (playback?.catch) await playback;
        els.replayBtn.textContent = "もう一度再生";
        syncAudioUI();
        return true;
      } catch (error){
        els.replayBtn.textContent = "もう一度再生";
        els.audio.controls = true;
        syncAudioUI();
        return false;
      }
    }
    els.audio.addEventListener("play", syncAudioUI);
    els.audio.addEventListener("pause", syncAudioUI);
    els.audio.addEventListener("ended", syncAudioUI);
    els.audio.addEventListener("timeupdate", syncAudioUI);
    [...els.audioSpeed.querySelectorAll(".speedBtn")].forEach(btn => {
      btn.addEventListener("click", () => {
        state.audioRate = Number(btn.dataset.rate);
        els.audio.playbackRate = state.audioRate;
        [...els.audioSpeed.querySelectorAll(".speedBtn")].forEach(item => {
          item.classList.toggle("active", item === btn);
        });
      });
    });
    els.showBtn.addEventListener("click", showAnswer);
    els.prevBtn.addEventListener("click", prev);
    els.nextBtn.addEventListener("click", next);
    els.againBtn.addEventListener("click", resetQuiz);
    els.copyBtn.addEventListener("click", async () => {
      els.copyText.select();
      try{
        await navigator.clipboard.writeText(els.copyText.value);
        els.copyBtn.textContent = "コピーしました";
        setTimeout(() => {
          els.copyBtn.textContent = "コピー";
        }, 1200);
      } catch (error){
        document.execCommand("copy");
      }
    });
    els.backToModeBtn.addEventListener("click", showModePicker);
    els.scrollTopBtn.addEventListener("click", () => {
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
    els.overviewBackBtn.addEventListener("click", () => renderSetPicker(state.mode));
    els.listeningModeBtn.addEventListener("click", () => renderSetPicker("listening"));
    els.paraphraseModeBtn.addEventListener("click", () => renderSetPicker("paraphrase"));
    els.playerTopBtn.addEventListener("click", showModePicker);
    els.playerPlayBtn.addEventListener("click", () => {
      if (els.playerAudio.paused || els.playerAudio.ended) playCurrentPlayerAudio();
      else pausePlayerAudio();
    });
    els.playerPrevBtn.addEventListener("click", prevPlayerTrack);
    els.playerNextBtn.addEventListener("click", () => nextPlayerTrack(true));
    els.playerAudio.addEventListener("play", () => {
      els.playerPlayBtn.textContent = "Pause";
    });
    els.playerAudio.addEventListener("pause", () => {
      els.playerPlayBtn.textContent = "Play";
    });
    els.playerAudio.addEventListener("timeupdate", () => {
      const duration = Number.isFinite(els.playerAudio.duration) && els.playerAudio.duration > 0 ? els.playerAudio.duration : 0;
      els.playerSeek.value = duration ? String(Math.min(100, (els.playerAudio.currentTime / duration) * 100)) : "0";
    });
    els.playerAudio.addEventListener("ended", () => {
      clearPlayerTimer();
      els.playerPlayBtn.textContent = "Next in 3s";
      state.playerTimer = setTimeout(() => {
        state.playerTimer = null;
        nextPlayerTrack(true);
      }, 3000);
    });
    els.playerSeek.addEventListener("input", () => {
      const duration = Number.isFinite(els.playerAudio.duration) && els.playerAudio.duration > 0 ? els.playerAudio.duration : 0;
      if (duration) els.playerAudio.currentTime = (Number(els.playerSeek.value) / 100) * duration;
    });
    [...els.ratings.children].forEach(btn => {
      btn.addEventListener("click", () => rate(btn.dataset.rating, btn));
    });
    init();
  </script>
</body>
</html>
